services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-balipay}
      POSTGRES_USER: ${POSTGRES_USER:-balipay}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-balipay_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-balipay} -d ${POSTGRES_DB:-balipay}"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend-api:
    build:
      context: ./backend-api
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: ${DATABASE_URL:-postgres://balipay:balipay_dev_password@postgres:5432/balipay}
      JWT_SECRET: ${JWT_SECRET:-change-me-before-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@balipay.fr}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-ChangeMe123!}
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  admin-web:
    build:
      context: ./admin-web
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000}
    ports:
      - "5173:80"
    depends_on:
      - backend-api

volumes:
  postgres-data:
